<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluey Style Racer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #9bd4e4; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', sans-serif; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #ui { position: absolute; top: 20px; left: 20px; color: #fff;
              text-shadow: 3px 3px 0px #2a4b5c, -1px -1px 0 #2a4b5c, 1px -1px 0 #2a4b5c, -1px 1px 0 #2a4b5c, 1px 1px 0 #2a4b5c; }
        .stat { margin: 0; font-size: 2.2em; letter-spacing: 1px; line-height: 1.3; }

        #mode-indicator {
            font-size: 1.3em; font-weight: bold; padding: 8px 15px; border-radius: 20px;
            display: inline-block; margin-top: 8px;
            border: 3px solid #2a4b5c; box-shadow: 0px 4px 0px #2a4b5c;
        }
        .mode-toddler { background: #ffba52; color: #fff; }
        .mode-pro { background: #66b8d9; color: #fff; }

        #controls {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .btn {
            font-family: inherit; font-size: 1.1em; font-weight: bold;
            padding: 12px 22px; border-radius: 16px; border: 3px solid #2a4b5c;
            box-shadow: 0px 4px 0px #2a4b5c; cursor: pointer;
            color: #fff; text-shadow: 1px 1px 0px #2a4b5c;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0px 1px 0px #2a4b5c; }
        .btn-calibrate { background: #f5a623; }
        .btn-reset { background: #e85d75; }
        .btn-mode { background: #7bc67e; }

        #calibration-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(42, 75, 92, 0.85);
            z-index: 100; justify-content: center; align-items: center;
            flex-direction: column; color: #fff; text-align: center;
        }
        #calibration-overlay.active { display: flex; }
        #calibration-overlay h2 {
            font-size: 2.5em; margin-bottom: 15px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
        }
        #calibration-overlay p { font-size: 1.4em; margin-bottom: 25px; max-width: 500px; line-height: 1.4; }
        #calibration-overlay .btn { font-size: 1.3em; padding: 15px 35px; }

        #input-hint {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 1.2em; font-weight: bold;
            text-shadow: 2px 2px 0px #2a4b5c;
            opacity: 1; transition: opacity 1s;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <p class="stat">SPEED: <span id="speedDisplay">0</span> km/h</p>
        <p class="stat">SCORE: <span id="scoreDisplay">0</span></p>
        <div id="mode-indicator" class="mode-pro">BLUEY RACER (8YO)</div>
    </div>

    <div id="controls">
        <button class="btn btn-calibrate" id="btnCalibrate">🎯 Calibrate</button>
        <button class="btn btn-reset" id="btnReset">🔄 Reset</button>
        <button class="btn btn-mode" id="btnMode">🐶 Switch Mode</button>
    </div>

    <div id="calibration-overlay">
        <h2>🎯 CALIBRATE</h2>
        <p id="calibration-text">Move your mouse (or finger) to the CENTER of the screen. This becomes your neutral steering position.</p>
        <button class="btn btn-calibrate" id="btnConfirmCalibrate">Set Centre &amp; Go!</button>
    </div>

    <div id="input-hint">🖱️ Move mouse left/right to steer &nbsp;|&nbsp; ⌨️ Arrow keys work too!</div>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        const ROAD_HALF_WIDTH = 5.0;
        const CAR_COLLIDER_HALF = 1.6;

        // =============================================
        // STATE
        // =============================================
        let playerMode = 'PRO';    // 'PRO' | 'TODDLER'
        let speed = 0;
        let score = 0;
        let targetCarX = 0;
        let time = 0;
        let paused = false;

        // Input state — normalised -1 (left) to +1 (right)
        let steerInput = 0;
        let calibrationOffsetX = 0.5;   // normalised centre (0–1 range of screen)

        // WebSocket hand data (optional)
        let wsConnected = false;
        let hands = [
            { x: window.innerWidth / 3, y: window.innerHeight / 2 },
            { x: window.innerWidth * 0.66, y: window.innerHeight / 2 }
        ];

        // DOM refs
        const uiSpeed = document.getElementById('speedDisplay');
        const uiScore = document.getElementById('scoreDisplay');
        const modeEl  = document.getElementById('mode-indicator');
        const hintEl  = document.getElementById('input-hint');

        // =============================================
        // INPUT — MOUSE / TOUCH
        // =============================================
        let pointerActive = false;
        let pointerNormX = 0.5; // 0 = left edge, 1 = right edge

        function handlePointerMove(clientX) {
            pointerActive = true;
            pointerNormX = clientX / window.innerWidth;
            steerInput = (pointerNormX - calibrationOffsetX) * 2; // -1 … +1
            steerInput = Math.max(-1, Math.min(1, steerInput));
        }

        window.addEventListener('mousemove', e => handlePointerMove(e.clientX));
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handlePointerMove(e.touches[0].clientX);
        }, { passive: false });

        // =============================================
        // INPUT — KEYBOARD (arrows / WASD)
        // =============================================
        const keysDown = {};
        window.addEventListener('keydown', e => {
            keysDown[e.key] = true;
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'].includes(e.key)) {
                pointerActive = false; // keyboard takes over
            }
        });
        window.addEventListener('keyup', e => { keysDown[e.key] = false; });

        function readKeyboardSteering() {
            if (pointerActive || wsConnected) return; // mouse/ws has priority when active
            let kb = 0;
            if (keysDown['ArrowLeft']  || keysDown['a']) kb -= 1;
            if (keysDown['ArrowRight'] || keysDown['d']) kb += 1;
            steerInput = kb;
        }

        // =============================================
        // INPUT — WEBSOCKET (optional hand tracker)
        // =============================================
        function tryWebSocket() {
            try {
                const ws = new WebSocket('ws://localhost:8080');
                ws.onopen = () => {
                    wsConnected = true;
                    hintEl.textContent = '🖐️ Hand tracking connected!';
                };
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.leftHand && data.rightHand) {
                            hands[0].x = data.leftHand.x * window.innerWidth;
                            hands[0].y = data.leftHand.y * window.innerHeight;
                            hands[1].x = data.rightHand.x * window.innerWidth;
                            hands[1].y = data.rightHand.y * window.innerHeight;

                            // Derive steering from hand tilt (delta Y between hands)
                            let deltaY = hands[0].y - hands[1].y;
                            let sensitivity = playerMode === 'TODDLER' ? 0.06 : 0.03;
                            if (Math.abs(deltaY) > 15) {
                                steerInput = -deltaY * sensitivity;
                                steerInput = Math.max(-1, Math.min(1, steerInput));
                            }

                            // Auto-detect player size for mode
                            let avgY = (hands[0].y + hands[1].y) / 2;
                            if (avgY > window.innerHeight * 0.6 && playerMode !== 'TODDLER') {
                                setMode('TODDLER');
                            } else if (avgY <= window.innerHeight * 0.6 && playerMode !== 'PRO') {
                                setMode('PRO');
                            }
                        }
                    } catch (_) {}
                };
                ws.onclose = () => { wsConnected = false; };
                ws.onerror = () => { wsConnected = false; ws.close(); };
            } catch (_) {
                wsConnected = false;
            }
        }
        tryWebSocket();

        // =============================================
        // CALIBRATE / RESET / MODE
        // =============================================
        const calOverlay = document.getElementById('calibration-overlay');

        document.getElementById('btnCalibrate').addEventListener('click', () => {
            paused = true;
            calOverlay.classList.add('active');
        });

        document.getElementById('btnConfirmCalibrate').addEventListener('click', () => {
            calibrationOffsetX = pointerNormX; // wherever the pointer is now = centre
            calOverlay.classList.remove('active');
            paused = false;
        });

        document.getElementById('btnReset').addEventListener('click', resetGame);

        document.getElementById('btnMode').addEventListener('click', () => {
            setMode(playerMode === 'PRO' ? 'TODDLER' : 'PRO');
        });

        function setMode(mode) {
            playerMode = mode;
            if (mode === 'TODDLER') {
                modeEl.className = 'mode-toddler';
                modeEl.innerText = 'BINGO MODE (3YO)';
            } else {
                modeEl.className = 'mode-pro';
                modeEl.innerText = 'BLUEY RACER (8YO)';
            }
        }

        function resetGame() {
            speed = 0;
            score = 0;
            targetCarX = 0;
            steerInput = 0;
            carGroup.position.set(0, 0, 0);
            carGroup.rotation.set(0, 0, 0);
            // Respawn objects
            gameObjects.forEach((obj, i) => {
                obj.position.z = -20 - (i * 12);
                if (obj.userData.type === 'tree') {
                    obj.position.x = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 4);
                } else {
                    obj.position.x = (Math.random() * 12) - 6;
                }
            });
        }

        // Fade out hint after 6s
        setTimeout(() => { hintEl.style.opacity = '0'; }, 6000);

        // =============================================
        // THREE.JS SCENE
        // =============================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x9bd4e4);
        scene.fog = new THREE.Fog(0x9bd4e4, 20, 90);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 7, 16);
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xfff4e6, 0.5);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        scene.add(dirLight);

        // --- INK OUTLINE HELPER ---
        function addInkOutline(geometry, scaleOffset = 1.05) {
            const mat = new THREE.MeshBasicMaterial({ color: 0x2a4b5c, side: THREE.BackSide });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.scale.set(scaleOffset, scaleOffset, scaleOffset);
            return mesh;
        }

        // --- GROUND & ROAD ---
        const groundGeo = new THREE.PlaneGeometry(120, 200);
        const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ color: 0x88c878 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const road = new THREE.Mesh(
            new THREE.PlaneGeometry(14, 200),
            new THREE.MeshLambertMaterial({ color: 0xe8c490 })
        );
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.05;
        road.receiveShadow = true;
        scene.add(road);

        // Road lane dashes
        const dashMat = new THREE.MeshLambertMaterial({ color: 0xfff8e8 });
        for (let i = 0; i < 20; i++) {
            const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2.5), dashMat);
            dash.rotation.x = -Math.PI / 2;
            dash.position.set(0, 0.06, -i * 10);
            scene.add(dash);
        }

        // --- PLAYER CAR ---
        const carGroup = new THREE.Group();

        const bodyMat   = new THREE.MeshLambertMaterial({ color: 0x4a90e2 });
        const roofMat   = new THREE.MeshLambertMaterial({ color: 0xfffae6 });
        const windowMat = new THREE.MeshLambertMaterial({ color: 0x223344 });
        const tireMat   = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const rimMat    = new THREE.MeshLambertMaterial({ color: 0xdddddd });

        // Chassis
        const chassisGeo = new THREE.BoxGeometry(3.2, 1.2, 5.5);
        const chassis = new THREE.Mesh(chassisGeo, bodyMat);
        chassis.position.y = 1.0;
        chassis.castShadow = true;
        const chassisOutline = addInkOutline(chassisGeo, 1.0);
        chassisOutline.scale.set(1.03, 1.05, 1.02);
        chassis.add(chassisOutline);
        carGroup.add(chassis);

        // Cabin
        const cabinGeo = new THREE.BoxGeometry(3.0, 1.4, 3.5);
        const cabin = new THREE.Mesh(cabinGeo, roofMat);
        cabin.position.set(0, 2.3, -0.6);
        cabin.castShadow = true;
        const cabinOutline = addInkOutline(cabinGeo, 1.0);
        cabinOutline.scale.set(1.03, 1.05, 1.03);
        cabin.add(cabinOutline);
        carGroup.add(cabin);

        // Windows
        const sideWin = new THREE.Mesh(new THREE.BoxGeometry(3.1, 0.8, 2.8), windowMat);
        sideWin.position.set(0, 2.2, -0.6);
        carGroup.add(sideWin);

        const frontWin = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 3.6), windowMat);
        frontWin.position.set(0, 2.2, -0.6);
        carGroup.add(frontWin);

        // Headlights
        const headlightMat = new THREE.MeshLambertMaterial({ color: 0xffee88 });
        [[-1, 0.9, -2.75], [1, 0.9, -2.75]].forEach(p => {
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), headlightMat);
            hl.position.set(...p);
            carGroup.add(hl);
        });

        // Taillights
        const taillightMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
        [[-1, 0.9, 2.75], [1, 0.9, 2.75]].forEach(p => {
            const tl = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), taillightMat);
            tl.position.set(...p);
            carGroup.add(tl);
        });

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.4, 16);
        wheelGeo.rotateZ(Math.PI / 2);
        const rimGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.45, 16);
        rimGeo.rotateZ(Math.PI / 2);

        const wheelPositions = [[-1.6,0.7,1.6],[1.6,0.7,1.6],[-1.6,0.7,-1.6],[1.6,0.7,-1.6]];
        const wheels = [];
        wheelPositions.forEach(pos => {
            const wg = new THREE.Group();
            wg.position.set(...pos);
            const tire = new THREE.Mesh(wheelGeo, tireMat);
            tire.castShadow = true;
            tire.add(addInkOutline(wheelGeo, 1.15));
            wg.add(tire);
            wg.add(new THREE.Mesh(rimGeo, rimMat));
            wheels.push(wg);
            carGroup.add(wg);
        });

        scene.add(carGroup);

        // --- OBSTACLES & COLLECTIBLES ---
        const gameObjects = [];

        const treeMat  = new THREE.MeshLambertMaterial({ color: 0x4cae50 });
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0xa06d4b });
        const starMat  = new THREE.MeshLambertMaterial({ color: 0xffdd00 });
        const ballMat  = new THREE.MeshLambertMaterial({ color: 0xff6b6b });

        const leavesGeo = new THREE.SphereGeometry(1.8, 12, 12);
        const trunkGeo  = new THREE.CylinderGeometry(0.4, 0.5, 1.5, 8);
        const starGeo   = new THREE.CylinderGeometry(0.8, 0.8, 0.3, 5);
        starGeo.rotateX(Math.PI / 2);
        const ballGeo   = new THREE.SphereGeometry(1.2, 16, 16);

        function spawnObject(zPos) {
            const roll = Math.random();
            const obj = new THREE.Group();
            obj.position.set((Math.random() * 12) - 6, 0, zPos);

            if (roll > 0.6) {
                // Tree — roadside scenery
                obj.position.x = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 4);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 0.75;
                trunk.add(addInkOutline(trunkGeo));
                const leaves = new THREE.Mesh(leavesGeo, treeMat);
                leaves.position.y = 2.5;
                leaves.scale.set(1, 1.2, 1);
                leaves.add(addInkOutline(leavesGeo));
                const leaves2 = new THREE.Mesh(leavesGeo, treeMat);
                leaves2.position.set(1, 1.8, 0);
                leaves2.scale.set(0.7, 0.7, 0.7);
                leaves2.add(addInkOutline(leavesGeo));
                obj.add(trunk, leaves, leaves2);
                obj.userData = { type: 'tree' };
            } else if (roll > 0.3) {
                // Collectible star
                const star = new THREE.Mesh(starGeo, starMat);
                star.position.y = 1.2;
                star.add(addInkOutline(starGeo, 1.1));
                obj.add(star);
                obj.userData = { type: 'star' };
            } else {
                // Hazard ball
                const ball = new THREE.Mesh(ballGeo, ballMat);
                ball.position.y = 1.2;
                ball.add(addInkOutline(ballGeo, 1.05));
                obj.add(ball);
                obj.userData = { type: 'hazard' };
            }

            obj.children.forEach(c => { c.castShadow = true; });
            scene.add(obj);
            gameObjects.push(obj);
        }

        for (let i = 0; i < 25; i++) spawnObject(-20 - (i * 12));

        // =============================================
        // GAME LOOP
        // =============================================
        const maxSpeed = 100;
        let lastTime = performance.now();

        function animate(now) {
            requestAnimationFrame(animate);
            if (paused) { renderer.render(scene, camera); return; }

            const dt = Math.min((now - lastTime) / 1000, 0.05); // cap delta
            lastTime = now;
            time += dt;

            // --- Read input ---
            readKeyboardSteering();

            // --- Steering ---
            const steerSpeed = playerMode === 'TODDLER' ? 8 : 5;
            targetCarX += steerInput * steerSpeed * dt * 60 * 0.05;
            targetCarX = Math.max(-ROAD_HALF_WIDTH, Math.min(ROAD_HALF_WIDTH, targetCarX));

            // Smooth car position
            carGroup.position.x += (targetCarX - carGroup.position.x) * 0.12;
            carGroup.rotation.z = (carGroup.position.x - targetCarX) * 0.12;

            // --- Speed ---
            speed += 30 * dt;
            if (speed > maxSpeed) speed = maxSpeed;
            const moveSpeed = speed * 0.004;

            // Bounce
            carGroup.position.y = Math.abs(Math.sin(time * 8)) * 0.12;

            // Spin wheels
            wheels.forEach(w => { w.rotation.x -= moveSpeed; });

            // --- Move objects ---
            for (let i = gameObjects.length - 1; i >= 0; i--) {
                const obj = gameObjects[i];
                obj.position.z += moveSpeed;

                // Animate stars
                if (obj.userData.type === 'star' && obj.children[0]) {
                    obj.children[0].rotation.y += 0.04;
                    obj.children[0].position.y = 1.2 + Math.sin(time * 4 + obj.position.x) * 0.3;
                }

                // Collision
                if (obj.position.z > -1.5 && obj.position.z < 2.5) {
                    const dx = Math.abs(obj.position.x - carGroup.position.x);
                    if (dx < 2.5) {
                        if (obj.userData.type === 'star') {
                            score += 10;
                            obj.position.z = 50; // remove
                        } else if (obj.userData.type === 'hazard') {
                            if (playerMode === 'PRO') {
                                speed = Math.max(15, speed - 30);
                            } else {
                                // Toddler mode: gently nudge away
                                targetCarX += (obj.position.x > carGroup.position.x ? -3 : 3);
                            }
                            obj.position.z = 50;
                        }
                    }
                }

                // Recycle
                if (obj.position.z > 15) {
                    obj.position.z = -100 - (Math.random() * 30);
                    if (obj.userData.type === 'tree') {
                        obj.position.x = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 4);
                    } else {
                        obj.position.x = (Math.random() * 12) - 6;
                    }
                }
            }

            // UI
            uiSpeed.textContent = Math.floor(speed);
            uiScore.textContent = score;

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
